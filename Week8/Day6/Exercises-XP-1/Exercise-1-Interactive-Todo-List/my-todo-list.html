<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My TODO List</title>
</head>
<body>
    <section id="todoSection">
        <h1>My Todo List</h1>
        <div id="newTodo">
            <input type="text" id="inputTask" placeholder="Enter a new todo" >
            <div id="btnGroup">
                <button type="button" id="addButton">ADD TODO</button>
                <button type="button" id="removeButton">REMOVE ALL</button>
            </div>
        </div>
    </section>
    <section id="filterButtons">
        <div id="fButtons">
            <button type="button" id="bAll">ALL</button>
            <button type="button" id="bActive">ACTIVE</button>
            <button type="button" id="bCompleted">COMPLETED</button>
        </div>
    </section>
    <section id="tasks">
    </section>
    <script src="script.js"></script>
</body>
</html>
